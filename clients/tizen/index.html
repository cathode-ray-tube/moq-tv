<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>moqtv - sample</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="./styles.css">
  <style>
    .logo-square {width:72px;height:72px;border-radius:12px;overflow:hidden}
  </style>
</head>
<body>
  <div class="app">
    <div class="left">
      <moq-sidebar id="sidebar" logo-src="moqtv-logo.png"></moq-sidebar>
    </div>
    <div class="main">
      <div class="header">
        <div class="topbar">
          <moq-url-port id="conn"></moq-url-port>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <moq-icon-bar id="icons"></moq-icon-bar>
        </div>
      </div>

      <div class="grid-wrap" id="gridWrap">
        <moq-video-grid id="grid"></moq-video-grid>
      </div>
    </div>
  </div>

  <script type="module" src="./index.js"></script>
</body>
</html>
